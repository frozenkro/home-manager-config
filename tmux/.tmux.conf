# ============================================
# KEY BINDINGS
# ============================================

# Change prefix to Ctrl+a (more ergonomic)
# unbind C-b
# set -g prefix C-a
# bind C-a send-prefix

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Better pane splitting (and keep current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5


# ============================================
# APPEARANCE
# ============================================

# Status bar colors
set -g status-style 'bg=#2e3440 fg=#808080'
set -g status-left-length 20
set -g status-right-length 50

# Status bar content
set -g status-left '#[fg=#88c0d0,bold] #S #[fg=#4c566a]│ '
set -g status-right '#[fg=#4c566a]│#[fg=#d8dee9] %H:%M #[fg=#4c566a]│#[fg=#d8dee9] %d-%b-%y '

# Window status
setw -g window-status-format ' #I:#W '
setw -g window-status-current-format '#[fg=#88c0d0,bold] #I:#W '

# Pane border colors
set -g pane-border-style 'fg=#4c566a'
set -g pane-active-border-style 'fg=#88c0d0'

# Message styling
set -g message-style 'bg=#88c0d0 fg=#2e3440 bold'

# ============================================
# COPY MODE
# ============================================

# Use vi keys
setw -g mode-keys vi

# Vi-style copy bindings
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"

set-option -g default-shell /bin/zsh
